server.port=8080

# DB
spring.datasource.url=jdbc:mysql://localhost:3306/notification_db?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Redis - using for notification status cache
# initially tried to cache entire notification objects but that caused issues
# with deserialization, so sticking with status strings for now
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notif-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.retries=3

kafka.topic.notifications=notification-events
kafka.topic.partitions=3
kafka.topic.replicas=1

# JWT
jwt.secret=mySecretKeyForNotificationServiceChangeThisInProduction
jwt.expiration.ms=86400000

logging.level.com.ram=DEBUG
logging.level.org.springframework.kafka=WARN
